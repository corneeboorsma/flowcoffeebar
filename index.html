<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#fdf8f3">
  <title>Flow Coffeebar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- WELKOM POP-UP -->
  <div class="welcome-overlay" id="welcome-overlay">
    <div class="welcome-card">
      <div class="welcome-logo">
        <div class="script">flow</div>
        <div class="subtitle">Coffeebar</div>
      </div>
      <p class="welcome-tagline">Meer dan koffie alleen.</p>
      <p class="welcome-text">De plek waar je mag landen, jezelf kunt zijn en gezien wordt.</p>
      <button class="welcome-btn" id="welcome-btn">Klik hier om door te gaan</button>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-spacer"></div>
    <div class="header-logo">
      <div>
        <div class="script">flow</div>
        <div class="subtitle">Coffeebar</div>
      </div>
    </div>
    <div class="lang-switcher" id="lang-switcher"></div>
  </header>

  <!-- BIJBELTEKST -->
  <div class="hero-quote-wrap">
    <p class="hero-quote" id="hero-quote"></p>
  </div>

  <!-- CATEGORY TABS -->
  <nav class="nav-tabs" id="nav-tabs"></nav>

  <!-- MENU -->
  <main id="menu-container"></main>

  <!-- CART FAB -->
  <button class="cart-fab hidden" id="cart-fab" onclick="openCart()">
    <span class="cart-fab-left">
      🛒
      <span class="cart-count" id="cart-count">0</span>
      <span id="cart-fab-label">Mandje</span>
    </span>
    <span id="cart-total-fab">€ 0.00</span>
  </button>

  <!-- CART MODAL -->
  <div class="modal-overlay" id="cart-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Jouw bestelling</h2>
        <button class="modal-close" onclick="closeCart()">✕</button>
      </div>
      <div id="cart-body"></div>
    </div>
  </div>

  <script src="translations.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById('welcome-btn').addEventListener('click', function() {
      var overlay = document.getElementById('welcome-overlay');
      overlay.style.transition = 'opacity 0.4s ease';
      overlay.style.opacity = '0';
      overlay.style.pointerEvents = 'none';
      setTimeout(function() {
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      }, 420);
    });
  </script>
</body>
</html>

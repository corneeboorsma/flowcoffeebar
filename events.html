<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fdf8f3">
  <title>Events — Flow Coffeebar</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .events-hero {
      background: var(--accent-light);
      padding: 48px 24px 40px;
      text-align: center;
    }
    .events-hero .script { font-size: 3rem; color: var(--primary); }
    .events-hero-title { font-size: 1.8rem; font-style: italic; color: var(--text); margin-top: 4px; }
    .events-hero-sub { font-size: 0.92rem; color: var(--text-mid); margin-top: 8px; }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      padding: 40px 24px 80px;
      max-width: 960px;
      margin: 0 auto;
    }

    .event-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all 0.25s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .event-card:hover { box-shadow: var(--shadow); transform: translateY(-3px); }

    .event-card-theme {
      height: 8px;
    }

    .event-card-body { padding: 22px 22px 20px; }

    .event-card-theme-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    .event-card-title {
      font-size: 1.25rem;
      font-style: italic;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .event-card-desc {
      font-size: 0.85rem;
      color: var(--text-mid);
      line-height: 1.6;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .event-card-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.8rem;
      color: var(--text-light);
    }

    .event-card-meta span { display: flex; align-items: center; gap: 6px; }

    .event-card-footer {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .spots-badge {
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--bg-soft);
      color: var(--text-mid);
    }
    .spots-badge.full { background: #fff0ee; color: var(--danger); }
    .spots-badge.low { background: #fff8e1; color: #8a6e00; }

    .no-events {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-light);
      grid-column: 1 / -1;
    }
    .no-events .big-emoji { font-size: 3rem; display: block; margin-bottom: 16px; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-spacer"></div>
    <div class="header-logo">
      <div>
        <div class="script">flow</div>
        <div class="subtitle">Coffeebar</div>
      </div>
    </div>
    <div class="header-spacer"></div>
  </header>

  <div class="events-hero">
    <div class="script">events</div>
    <div class="events-hero-title">Kom samen. Beleef iets moois.</div>
    <div class="events-hero-sub">Ontdek onze aankomende evenementen bij Flow Coffeebar.</div>
  </div>

  <div class="events-grid" id="events-grid">
    <div class="no-events">
      <span class="big-emoji">☕</span>
      <p>Laden...</p>
    </div>
  </div>

  <script src="events.js"></script>
  <script>
    async function init() {
      const grid = document.getElementById('events-grid');
      const events = await getEvents();
      const published = events
        .filter(e => e.status === 'published')
        .sort((a, b) => new Date(a.date) - new Date(b.date));

      if (published.length === 0) {
        grid.innerHTML = `
          <div class="no-events">
            <span class="big-emoji">☕</span>
            <p>Momenteel geen evenementen gepland.<br>Kom binnenkort terug!</p>
          </div>`;
        return;
      }

      const cards = await Promise.all(published.map(async ev => {
        const regs = await getRegistrations(ev.id);
        const theme = THEMES[ev.theme] || THEMES.flow;
        const left = ev.maxAttendees ? Math.max(0, ev.maxAttendees - regs.length) : null;
        const isFull = left === 0;

        let spotsBadge = '';
        if (left !== null) {
          const cls = isFull ? 'full' : left <= 5 ? 'low' : '';
          const label = isFull ? 'Volgeboekt' : `${left} plekken vrij`;
          spotsBadge = `<span class="spots-badge ${cls}">${label}</span>`;
        }

        return `
          <a class="event-card" href="event.html?id=${ev.id}">
            <div class="event-card-theme" style="background:${theme.accent}"></div>
            <div class="event-card-body">
              <div class="event-card-theme-label" style="background:${theme.accent}22;color:${theme.accent}">
                ${theme.emoji} ${theme.label}
              </div>
              <div class="event-card-title">${ev.title}</div>
              <div class="event-card-desc">${ev.description || ''}</div>
              <div class="event-card-meta">
                <span>📅 ${formatDate(ev.date)}</span>
                ${ev.time ? `<span>🕐 ${ev.time}</span>` : ''}
                ${ev.location ? `<span>📍 ${ev.location}</span>` : ''}
              </div>
            </div>
            <div class="event-card-footer">
              ${spotsBadge}
              <span style="font-size:0.82rem;color:var(--primary);font-weight:600">Meer info →</span>
            </div>
          </a>`;
      }));

      grid.innerHTML = cards.join('');
    }

    init();
  </script>
</body>
</html>
